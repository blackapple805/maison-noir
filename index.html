<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#F2EDE2" media="(prefers-color-scheme: light)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <title>MAISON NOIR — Editorial Atelier</title>
    <meta name="description" content="Editorial atelier. Sculpted silhouettes, ritual craftsmanship." />
    <script>
      // Apply theme before paint to prevent flash
      (function() {
        try {
          var stored = localStorage.getItem('mn-theme');
          var t = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
