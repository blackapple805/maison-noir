<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Security: Content Security Policy
         Allows: self-hosted assets, Google Fonts (used), Unsplash images (hero),
         inline styles (Tailwind + framer-motion), inline scripts (theme bootstrap).
         Self-hosted videos (in public/videos/) work under media-src 'self'.
         Adjust 'connect-src' / 'media-src' if you later swap CDN providers. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      img-src 'self' data: blob: https://images.unsplash.com;
      media-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      script-src 'self' 'unsafe-inline';
      connect-src 'self';
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
      object-src 'none';
      upgrade-insecure-requests
    " />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#9C1B2A" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F2EDE2" media="(prefers-color-scheme: light)" />

    <!-- Primary SEO -->
    <title>MAISON·NOIR — French Apothecary</title>
    <meta name="description" content="French apothecary. Cold-pressed botanicals, ritual skincare, hand-blended in Grasse and Lyon. A quiet practice, three generations on." />
    <link rel="canonical" href="https://maison-noir.vercel.app/" />

    <!-- Open Graph — shared link previews on Facebook, LinkedIn, iMessage, Slack
         Replace the URL and image path with your production values when ready.
         The image should be 1200×630 px, ideally an editorial composition
         (sigil + wordmark + a fragment of a hero image). Drop it at /og-image.png
         in the public/ folder. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Maison·Noir" />
    <meta property="og:title" content="MAISON·NOIR — French Apothecary" />
    <meta property="og:description" content="French apothecary. Cold-pressed botanicals, ritual skincare, hand-blended in Grasse and Lyon." />
    <meta property="og:url" content="https://maison-noir.vercel.app/" />
    <meta property="og:image" content="https://maison-noir.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Maison·Noir — French apothecary, batch 26" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card — same idea, twitter-specific override -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MAISON·NOIR — French Apothecary" />
    <meta name="twitter:description" content="French apothecary. Cold-pressed botanicals, ritual skincare, hand-blended in Grasse and Lyon." />
    <meta name="twitter:image" content="https://maison-noir.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="Maison·Noir — French apothecary, batch 26" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />

    <script>
      // Apply theme before paint to prevent flash
      (function() {
        try {
          var stored = localStorage.getItem('mn-theme');
          var t = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
